    /* Layout */
    .inner {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 32px 28px 32px 32px;
      gap: 24px;
    }

    /* Polaroid */
    .polaroid {
      flex-shrink: 0;
      width: 210px;
      background: white;
      padding: 8px 8px 28px 8px;
      box-shadow: 3px 4px 16px rgba(0,0,0,0.18);
      transform: rotate(-2.5deg);
    }
    .polaroid img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }

    /* Right content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .label {
      font-family: "DM Sans", sans-serif;
      font-weight: 600;
      font-size: 8px;
      color: var(--brown);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    .client-name {
      font-family: "Great Vibes", cursive;
      font-size: 44px;
      color: var(--brown);
      line-height: 1.0;
      margin-bottom: 2px;
    }
    .event-type {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 4px;
    }
    .event-date {
      font-family: "DM Sans", sans-serif;
      font-size: 9.5px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .divider {
      width: 28px;
      height: 1px;
      background: var(--brown);
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .built-label {
      font-family: "DM Sans", sans-serif;
      font-weight: 600;
      font-size: 7.5px;
      color: var(--muted);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 9px;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 20px;
    }
    .feature {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .feature-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--brown);
      opacity: 0.55;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .feature-text {
      font-family: "DM Sans", sans-serif;
      font-size: 10.5px;
      color: var(--text);
      line-height: 1.4;
    }
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .price-label {
      font-family: "DM Sans", sans-serif;
      font-size: 8px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .price-val {
      font-family: "Cormorant Garamond", serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--brown);
    }

    /* Bottom tag */
    .tag {
      position: absolute;
      bottom: 16px;
      right: 28px;
      font-family: "DM Sans", sans-serif;
      font-size: 7.5px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
      z-index: 3;
    }
    .tag span { color: var(--brown); opacity: 1; }
  </style>
</head>
