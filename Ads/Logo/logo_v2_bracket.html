<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FJMedia Logo — V2 Bracket</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@200;300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    .logo-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 46px;
      background: #091929;
      border-bottom: 1px solid #0c2236;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 6px;
      z-index: 9999;
    }
    .logo-nav a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: 5px;
      border: 1px solid #112a44;
      color: #3a6080;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .logo-nav a:hover { border-color: #1b3a56; color: #888; background: #0d1f3c; }
    .logo-nav a.active { background: #0d1f3c; border-color: #c9a84c; color: #f5f5f5; }
    .logo-nav a.active .nav-num { color: #c9a84c; }
    .logo-nav a .nav-num { font-size: 10px; color: #c9a84c; }
    .logo-nav-sep { width: 1px; height: 18px; background: #0c2236; margin: 0 4px; }
    .logo-nav a.back { color: #1b3a56; letter-spacing: 0.05em; }
    .logo-nav a.back:hover { color: #666; }

    body {
      background: #071520;
      padding-top: 46px;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      gap: 0;
    }

    .version-tag {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #183450;
      margin-bottom: 64px;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 32px;
    }

    .stage-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #183450;
      align-self: flex-start;
    }

    .canvas-dark {
      width: 100%;
      background: #0d1f3c;
      border: 1px solid #0e2438;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 48px;
    }

    .canvas-light {
      width: 100%;
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 48px;
    }

    /* ── THE LOGO ── */
    .logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-main {
      display: inline-flex;
      align-items: center;
      gap: 0;
      line-height: 1;
    }

    .bracket {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 52px;
      color: #c9a84c;
      line-height: 1;
    }

    .fj-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 52px;
      color: #f5f5f5;
      letter-spacing: -0.01em;
      line-height: 1;
      padding: 0 6px;
    }

    .logo-sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #1b3a56;
    }

    /* horizontal variant */
    .logo-h {
      display: inline-flex;
      align-items: center;
      gap: 20px;
    }

    .logo-h-main {
      display: inline-flex;
      align-items: center;
    }

    .h-divider {
      width: 1px;
      height: 40px;
      background: #183450;
    }

    .logo-h-right {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .logo-h-right .big {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #f5f5f5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
    }

    .logo-h-right .big em {
      font-style: normal;
      color: #c9a84c;
    }

    .logo-h-right .small {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 9.5px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1b3a56;
    }

    /* light bg */
    .on-light .fj-text { color: #0d1f3c; }
    .on-light .logo-sub { color: #bbb; }
    .on-light .logo-h-right .big { color: #0d1f3c; }
    .on-light .logo-h-right .small { color: #bbb; }
    .on-light .h-divider { background: #ddd; }
  </style>
</head>
<body>

  <nav class="logo-nav">
    <a href="logo_viewer.html" class="back">← Viewer</a>
    <div class="logo-nav-sep"></div>
    <a href="logo_v1_badge.html"><span class="nav-num">V1</span> Badge</a>
    <a href="logo_v2_bracket.html" class="active"><span class="nav-num">V2</span> Bracket</a>
    <a href="logo_v3_wordmark.html"><span class="nav-num">V3</span> Wordmark</a>
    <a href="logo_v4_bold.html"><span class="nav-num">V4</span> Bold</a>
    <a href="logo_v5_slash.html"><span class="nav-num">V5</span> Slash</a>
  </nav>

  <div class="version-tag">V2 — The Bracket</div>

  <div class="stage">
    <div class="stage-label">Primary — Stacked (Dark)</div>
    <div class="canvas-dark">
      <div class="logo">
        <div class="logo-main">
          <span class="bracket">{</span>
          <span class="fj-text">FJ</span>
          <span class="bracket">}</span>
        </div>
        <div class="logo-sub">Media &nbsp;·&nbsp; Web Design &amp; Digital Solutions</div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="stage-label">Horizontal Lockup — Dark</div>
    <div class="canvas-dark">
      <div class="logo-h">
        <div class="logo-h-main">
          <span class="bracket" style="font-size:44px;">{</span>
          <span class="fj-text" style="font-size:44px;">FJ</span>
          <span class="bracket" style="font-size:44px;">}</span>
        </div>
        <div class="h-divider"></div>
        <div class="logo-h-right">
          <div class="big">FJ<em>Media</em></div>
          <div class="small">Web Design &amp; Digital Solutions</div>
        </div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="stage-label">Reversed — Light</div>
    <div class="canvas-light">
      <div class="logo on-light">
        <div class="logo-main">
          <span class="bracket">{</span>
          <span class="fj-text">FJ</span>
          <span class="bracket">}</span>
        </div>
        <div class="logo-sub" style="color:#bbb;">Media &nbsp;·&nbsp; Web Design &amp; Digital Solutions</div>
      </div>
    </div>
  </div>

</body>
</html>
