<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FJMedia — Logo Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060f1c;
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: #091929;
      border-bottom: 1px solid #0c2236;
      flex-shrink: 0;
    }

    .topbar-brand {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1b3a56;
    }

    .topbar-brand span { color: #c9a84c; }

    .topbar-hint {
      font-size: 11px;
      font-weight: 300;
      color: #222236;
      letter-spacing: 0.05em;
    }

    /* ── NAV BUTTONS ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 32px;
      background: #071520;
      border-bottom: 1px solid #0a1e34;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid #112a44;
      color: #3a6080;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      border-color: #1b3a56;
      color: #888;
      background: #0d1f3c;
    }

    .nav-btn.active {
      background: #0d1f3c;
      border-color: #c9a84c;
      color: #f5f5f5;
    }

    .nav-btn .num {
      font-size: 10px;
      color: #c9a84c;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .nav-btn.active .num { color: #c9a84c; }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: #0c2236;
      margin: 0 4px;
    }

    /* ── IFRAME CONTAINER ── */
    .frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .logo-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .logo-frame.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* ── BOTTOM STATUS BAR ── */
    .statusbar {
      height: 36px;
      background: #091929;
      border-top: 1px solid #0a1e34;
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 24px;
      flex-shrink: 0;
    }

    .status-item {
      font-size: 11px;
      font-weight: 300;
      color: #222236;
      letter-spacing: 0.08em;
    }

    .status-item span {
      color: #1b3a56;
    }

    #current-name {
      color: #c9a84c;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">FJ<span>Media</span> &nbsp;·&nbsp; Logo Viewer</div>
    <div class="topbar-hint">Click a version to preview</div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" data-target="logo_v1_badge.html" onclick="switchLogo(this)">
      <span class="num">V1</span> The Badge
    </button>
    <button class="nav-btn" data-target="logo_v2_bracket.html" onclick="switchLogo(this)">
      <span class="num">V2</span> The Bracket
    </button>
    <button class="nav-btn" data-target="logo_v3_wordmark.html" onclick="switchLogo(this)">
      <span class="num">V3</span> Pure Wordmark
    </button>
    <button class="nav-btn" data-target="logo_v4_bold.html" onclick="switchLogo(this)">
      <span class="num">V4</span> Bold Stack
    </button>
    <button class="nav-btn" data-target="logo_v5_slash.html" onclick="switchLogo(this)">
      <span class="num">V5</span> The Slash
    </button>
  </div>

  <!-- IFRAMES -->
  <div class="frame-wrap">
    <iframe class="logo-frame visible" id="frame-logo_v1_badge.html" src="logo_v1_badge.html"></iframe>
    <iframe class="logo-frame" id="frame-logo_v2_bracket.html" src="logo_v2_bracket.html"></iframe>
    <iframe class="logo-frame" id="frame-logo_v3_wordmark.html" src="logo_v3_wordmark.html"></iframe>
    <iframe class="logo-frame" id="frame-logo_v4_bold.html" src="logo_v4_bold.html"></iframe>
    <iframe class="logo-frame" id="frame-logo_v5_slash.html" src="logo_v5_slash.html"></iframe>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="status-item">Viewing: <span id="current-name">V1 — The Badge</span></div>
    <div class="status-item">File: <span id="current-file">logo_v1_badge.html</span></div>
  </div>

  <script>
    const names = {
      'logo_v1_badge.html':    'V1 — The Badge',
      'logo_v2_bracket.html':  'V2 — The Bracket',
      'logo_v3_wordmark.html': 'V3 — Pure Wordmark',
      'logo_v4_bold.html':     'V4 — Bold Stack',
      'logo_v5_slash.html':    'V5 — The Slash',
    };

    function switchLogo(btn) {
      const target = btn.dataset.target;

      // update buttons
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // update frames
      document.querySelectorAll('.logo-frame').forEach(f => f.classList.remove('visible'));
      document.getElementById('frame-' + target).classList.add('visible');

      // update status bar
      document.getElementById('current-name').textContent = names[target] || target;
      document.getElementById('current-file').textContent = target;
    }
  </script>

</body>
</html>
