<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FJMedia — Sugar & Shai Client Reveal</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:     #FDF6EE;
      --blush:     #F2C4CE;
      --rose:      #D4849A;
      --mocha:     #8B5E52;
      --chocolate: #5C3D35;
      --olive:     #4A5E2A;
      --olive-dark:#3A4A20;
      --text:      #3D2B27;
      --text-light:#7A5C56;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Lato", sans-serif;
    }

    .post {
      width: 540px;
      height: 540px;
      background: var(--cream);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Soft top band */
    .band {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 180px;
      background: var(--olive);
    }

    /* Blush accent circle */
    .blush-circle {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: var(--blush);
      opacity: 0.25;
      top: -60px;
      right: -60px;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      padding: 0 40px;
    }

    /* Client reveal label */
    .label {
      font-family: "Lato", sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: rgba(253,246,238,0.75);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Logo */
    .logo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--cream);
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Client name */
    .client-name {
      font-family: "Fredoka One", cursive;
      font-size: 38px;
      color: var(--chocolate);
      line-height: 1.05;
      margin-bottom: 4px;
    }

    .client-sub {
      font-family: "Pacifico", cursive;
      font-size: 13px;
      color: var(--rose);
      margin-bottom: 28px;
    }

    /* Divider */
    .divider {
      width: 36px;
      height: 2px;
      background: var(--blush);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    /* Features */
    .built-label {
      font-family: "Lato", sans-serif;
      font-weight: 700;
      font-size: 9px;
      color: var(--text-light);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 300px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid var(--blush);
      border-radius: 8px;
      padding: 9px 16px;
    }

    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--olive);
      flex-shrink: 0;
    }

    .feature-text {
      font-family: "Lato", sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--text);
    }

    /* Bottom tag */
    .tag {
      position: absolute;
      bottom: 22px;
      left: 0; right: 0;
      text-align: center;
      font-family: "Lato", sans-serif;
      font-weight: 700;
      font-size: 9px;
      color: var(--text-light);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      z-index: 2;
    }
    .tag span { color: var(--olive); }
  </style>
</head>
