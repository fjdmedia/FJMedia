<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FJMedia Logo Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@200;300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* 540px CSS → 1080px native at 2x device scale */
    .post {
      width: 540px;
      height: 540px;
      background: #071520;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle gold grid texture */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Corner accents */
    .post::before, .post::after {
      content: '';
      position: absolute;
      width: 72px;
      height: 72px;
      border-color: #c9a84c;
      border-style: solid;
      opacity: 0.3;
    }
    .post::before { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
    .post::after  { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

    /* Radial glow */
    .glow {
      position: absolute;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* ── LOGO ── */
    .logo {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .logo-main {
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }

    .bracket {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 96px;
      color: #c9a84c;
      line-height: 1;
    }

    .fj-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 96px;
      color: #f5f5f5;
      letter-spacing: -0.02em;
      line-height: 1;
      padding: 0 8px;
    }

    .logo-sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #1b3a56;
    }

    /* Bottom handle */
    .tag {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(201,168,76,0.25);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="logo">
      <div class="logo-main">
        <span class="bracket">{</span>
        <span class="fj-text">FJ</span>
        <span class="bracket">}</span>
      </div>
      <div class="logo-sub">Media &nbsp;·&nbsp; Web Design &amp; Digital Solutions</div>
    </div>

    <div class="tag">@fjmediawpg &nbsp;·&nbsp; fjmedia.ca</div>
  </div>
</body>
</html>
